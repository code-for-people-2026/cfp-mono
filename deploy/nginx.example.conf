# Phase 1 (validate on Alibaba Cloud alongside Vercel): point a TEMPORARY
# subdomain at the ECS and proxy it to the website container. Keep the real
# domain on Vercel until validation passes, then cut DNS over (phase 2).
#
# Replace the placeholder host with the temporary subdomain you create, e.g.
# website-staging.codeforpeople.cn (mirrors the existing demo.codeforpeople.cn
# pattern). HTTPS termination + the 80->443 redirect are added server-side
# (acme.sh DNS-01), see deploy/RUNBOOK.md.
server {
  listen 80;
  server_name website-staging.codeforpeople.cn;

  location / {
    proxy_pass http://127.0.0.1:3302;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
