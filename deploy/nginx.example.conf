# Host Nginx conf.d 示例。替换三个 .invalid host 与两个文档网段 allowlist；
# Compose 端口保持仅绑定 127.0.0.1，公网安全组只开放 80/443。
# CDN 必须以 www.codeforpeople.cn 同时作为回源 Host 与 SNI，并通过 443 回源。
server {
  listen 80;
  server_name codeforpeople.cn www.codeforpeople.cn;
  return 308 https://www.codeforpeople.cn$request_uri;
}

server {
  listen 443 ssl http2;
  server_name codeforpeople.cn;
  ssl_certificate /etc/nginx/ssl/website/fullchain.pem;
  ssl_certificate_key /etc/nginx/ssl/website/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  return 308 https://www.codeforpeople.cn$request_uri;
}

server {
  listen 443 ssl http2;
  server_name www.codeforpeople.cn;
  ssl_certificate /etc/nginx/ssl/website/fullchain.pem;
  ssl_certificate_key /etc/nginx/ssl/website/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;

  location / {
    proxy_pass http://127.0.0.1:3302;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
}

server {
  listen 80;
  server_name api.kith-inn.example.invalid cms.kith-inn.example.invalid h5.kith-inn.example.invalid;
  return 308 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name api.kith-inn.example.invalid;
  ssl_certificate /etc/nginx/ssl/kith-inn/fullchain.pem;
  ssl_certificate_key /etc/nginx/ssl/kith-inn/privkey.pem;

  location / {
    proxy_pass http://127.0.0.1:3310;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
}

server {
  listen 443 ssl http2;
  server_name cms.kith-inn.example.invalid;
  ssl_certificate /etc/nginx/ssl/kith-inn/fullchain.pem;
  ssl_certificate_key /etc/nginx/ssl/kith-inn/privkey.pem;
  allow 192.0.2.0/24;
  deny all;

  location / {
    proxy_pass http://127.0.0.1:3304;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
}

server {
  listen 443 ssl http2;
  server_name h5.kith-inn.example.invalid;
  ssl_certificate /etc/nginx/ssl/kith-inn/fullchain.pem;
  ssl_certificate_key /etc/nginx/ssl/kith-inn/privkey.pem;
  allow 198.51.100.0/24;
  deny all;

  location / {
    proxy_pass http://127.0.0.1:3305;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
}
