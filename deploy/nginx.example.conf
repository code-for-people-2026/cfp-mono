# Host Nginx conf.d 示例。替换三个 .invalid host、证书路径与两个文档网段 allowlist；
# Compose 端口保持仅绑定 127.0.0.1，公网安全组只开放 80/443。
# 既有 website 临时验证入口保持独立，不随 kith-inn 上线切换。
server {
  listen 80;
  server_name website-staging.codeforpeople.cn;

  location / {
    proxy_pass http://127.0.0.1:3302;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

server {
  listen 80;
  server_name api.kith-inn.example.invalid cms.kith-inn.example.invalid h5.kith-inn.example.invalid;
  return 308 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name api.kith-inn.example.invalid;
  ssl_certificate /etc/nginx/ssl/kith-inn/fullchain.pem;
  ssl_certificate_key /etc/nginx/ssl/kith-inn/privkey.pem;

  location / {
    proxy_pass http://127.0.0.1:3310;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
}

server {
  listen 443 ssl http2;
  server_name cms.kith-inn.example.invalid;
  ssl_certificate /etc/nginx/ssl/kith-inn/fullchain.pem;
  ssl_certificate_key /etc/nginx/ssl/kith-inn/privkey.pem;
  allow 192.0.2.0/24;
  deny all;

  location / {
    proxy_pass http://127.0.0.1:3304;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
}

server {
  listen 443 ssl http2;
  server_name h5.kith-inn.example.invalid;
  ssl_certificate /etc/nginx/ssl/kith-inn/fullchain.pem;
  ssl_certificate_key /etc/nginx/ssl/kith-inn/privkey.pem;
  allow 198.51.100.0/24;
  deny all;

  location / {
    proxy_pass http://127.0.0.1:3305;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
}
