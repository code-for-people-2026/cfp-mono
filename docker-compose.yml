services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "54324:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cfp
    volumes:
      - cfp_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cfp"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  cfp_postgres_data:

