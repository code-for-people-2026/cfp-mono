name: Deploy Production

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  affected:
    runs-on: ubuntu-latest
    outputs:
      website: ${{ steps.check.outputs.website }}
    steps:
      - uses: actions/checkout@v4
        if: github.event_name == 'push'
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        if: github.event_name == 'push'
        with:
          version: 10.2.0

      - uses: actions/setup-node@v4
        if: github.event_name == 'push'
        with:
          node-version: 22

      - id: check
        name: Check affected deploy targets
        run: |
          set_website() {
            echo "website=$1" >> "$GITHUB_OUTPUT"
            echo "website affected: $1"
          }

          if [ "$GITHUB_EVENT_NAME" != "push" ]; then
            set_website true
            exit 0
          fi

          base="${{ github.event.before }}"
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            set_website true
            exit 0
          fi

          if ! git cat-file -e "$base^{commit}"; then
            set_website true
            exit 0
          fi

          changed_files="$(git diff --name-only "$base" "$GITHUB_SHA")"
          printf '%s\n' "$changed_files"

          if printf '%s\n' "$changed_files" | grep -Eq '^(\.github/workflows/deploy-production\.yml|deploy/.*|package\.json|pnpm-lock\.yaml|pnpm-workspace\.yaml|turbo\.json)$'; then
            set_website true
            exit 0
          fi

          pnpm dlx turbo@2.6.3 run build "--filter=@cfp/website...[$base]" --dry-run=json --no-daemon > turbo-dry-run.json
          node <<'NODE'
          const fs = require("node:fs");

          const text = fs.readFileSync("turbo-dry-run.json", "utf8");
          const start = text.indexOf("{");
          if (start === -1) {
            throw new Error("Turbo dry run did not emit JSON.");
          }

          const data = JSON.parse(text.slice(start));
          const affected = data.tasks.length > 0;
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `website=${affected ? "true" : "false"}\n`);
          console.log(`website affected: ${affected}`);
          NODE

  prepare:
    needs: affected
    if: needs.affected.outputs.website == 'true'
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - id: check
        name: Check production deployment configuration
        env:
          ALIYUN_ACR_REGISTRY: ${{ secrets.ALIYUN_ACR_REGISTRY }}
          ALIYUN_ACR_NAMESPACE: ${{ secrets.ALIYUN_ACR_NAMESPACE }}
          ALIYUN_ACR_USERNAME: ${{ secrets.ALIYUN_ACR_USERNAME }}
          ALIYUN_ACR_PASSWORD: ${{ secrets.ALIYUN_ACR_PASSWORD }}
          ECS_SSH_KEY: ${{ secrets.ECS_SSH_KEY }}
          ECS_HOST: ${{ secrets.ECS_HOST }}
          ECS_USER: ${{ secrets.ECS_USER }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          missing=()
          for name in \
            ALIYUN_ACR_REGISTRY \
            ALIYUN_ACR_NAMESPACE \
            ALIYUN_ACR_USERNAME \
            ALIYUN_ACR_PASSWORD \
            ECS_SSH_KEY \
            ECS_HOST \
            ECS_USER \
            DATABASE_URL \
            PAYLOAD_SECRET \
            NEXT_PUBLIC_SITE_URL \
            DEEPSEEK_API_KEY
          do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -eq 0 ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "Production deployment is configured."
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Production deployment skipped because required secrets are missing: ${missing[*]}"
          fi

  deploy:
    needs: [affected, prepare]
    if: needs.affected.outputs.website == 'true' && needs.prepare.outputs.configured == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      WEBSITE_IMAGE: ${{ secrets.ALIYUN_ACR_REGISTRY }}/${{ secrets.ALIYUN_ACR_NAMESPACE }}/cfp-website:${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      # 先等 ci.yml 的 verify 通过再 build/部署。merge 路径已由 branch protection 的
      # required check 把关;这一步堵住 workflow_dispatch 手动触发等 required check 管不到
      # 的路径(Codex #91 P1)。不在 host 重跑测试,只等 CI 结论,所以不重新占磁盘。
      - name: Wait for CI (verify) to pass
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          SHA="${{ github.sha }}"
          RUN_ID=$(gh run list --workflow=ci.yml --commit="$SHA" --limit=1 --json databaseId -q '.[0].databaseId' 2>/dev/null || true)
          if [ -z "$RUN_ID" ]; then
            echo "No ci.yml run found for $SHA — aborting deploy (CI must pass first)."
            exit 1
          fi
          echo "Waiting for ci.yml run #$RUN_ID (commit $SHA) to finish..."
          gh run watch "$RUN_ID" --exit-status
          echo "CI passed, proceeding to build & deploy."

      # deploy job 只负责「build 镜像 + 发货」:不在 host 装 node_modules、不跑测试。
      # 测试由 ci.yml 在 PR/push 时守,这里再跑 pnpm verify 只会让 host 与 docker 各占一份
      # 磁盘,曾叠加撑爆 runner ~15GB 可用空间。docker build 自带 install + next build,
      # smoke test 只用 curl,所以 host 的 pnpm/node setup 一并去掉。
      - name: Free disk space
        run: |
          # ubuntu-latest 预装了 Android/.NET/Haskell 等约 50GB 工具链,website 镜像 docker build
          # 时 layer 解压(monaco-editor/next/sharp)需要空间,删掉用不上的预装腾出 15-25GB。
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/.ghcup /opt/az /usr/local/share /opt/hostedtoolcache 2>/dev/null || true
          sudo apt-get clean
          df -h /

      - name: Login to Alibaba Cloud ACR
        uses: aliyun/acr-login@v1
        with:
          login-server: ${{ secrets.ALIYUN_ACR_REGISTRY }}
          username: ${{ secrets.ALIYUN_ACR_USERNAME }}
          password: ${{ secrets.ALIYUN_ACR_PASSWORD }}

      - name: Build and push image
        run: |
          docker build -f apps/website/Dockerfile -t "$WEBSITE_IMAGE" .
          docker push "$WEBSITE_IMAGE"

      - name: Write SSH key
        env:
          ECS_SSH_KEY: ${{ secrets.ECS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$ECS_SSH_KEY" > ~/.ssh/cfp-ecs
          chmod 600 ~/.ssh/cfp-ecs

      - name: Deploy on ECS
        env:
          ECS_HOST: ${{ secrets.ECS_HOST }}
          ECS_USER: ${{ secrets.ECS_USER }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
          DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL }}
          ACR_REGISTRY: ${{ secrets.ALIYUN_ACR_REGISTRY }}
          ACR_USERNAME: ${{ secrets.ALIYUN_ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ALIYUN_ACR_PASSWORD }}
        run: |
          cat > .env.production.remote <<EOF
          DATABASE_URL=$DATABASE_URL
          PAYLOAD_DATABASE_URL=$DATABASE_URL
          PAYLOAD_SECRET=$PAYLOAD_SECRET
          PAYLOAD_DB_PUSH=false
          ALLOW_ADMIN_BOOTSTRAP=false
          NEXT_PUBLIC_SITE_URL=$NEXT_PUBLIC_SITE_URL
          DEEPSEEK_API_KEY=$DEEPSEEK_API_KEY
          DEEPSEEK_BASE_URL=$DEEPSEEK_BASE_URL
          DEEPSEEK_MODEL=$DEEPSEEK_MODEL
          EOF

          cat > .env.images.remote <<EOF
          WEBSITE_IMAGE=$WEBSITE_IMAGE
          EOF

          ssh -i ~/.ssh/cfp-ecs -o StrictHostKeyChecking=no "$ECS_USER@$ECS_HOST" "mkdir -p ~/cfp-mono"
          scp -i ~/.ssh/cfp-ecs -o StrictHostKeyChecking=no deploy/docker-compose.prod.yml "$ECS_USER@$ECS_HOST:~/cfp-mono/docker-compose.yml"
          scp -i ~/.ssh/cfp-ecs -o StrictHostKeyChecking=no .env.production.remote "$ECS_USER@$ECS_HOST:~/cfp-mono/.env.production"
          scp -i ~/.ssh/cfp-ecs -o StrictHostKeyChecking=no .env.images.remote "$ECS_USER@$ECS_HOST:~/cfp-mono/.env"
          printf '%s' "$ACR_PASSWORD" | ssh -i ~/.ssh/cfp-ecs -o StrictHostKeyChecking=no "$ECS_USER@$ECS_HOST" \
            "docker login --username '$ACR_USERNAME' --password-stdin '$ACR_REGISTRY'"
          # pull 前清掉未用旧镜像 + 构建缓存:ECS 40G 盘会被历次 deploy 累积的旧镜像撑满
          # (曾导致 docker compose pull 解压时 no space left on device)。prune -af 只删
          # "没有运行中容器引用的"镜像 → 当前在跑的旧版保留, 新镜像失败可回滚上一版;
          # 更早的历史 tag 永久留在阿里云 ACR, 需要时 docker pull 回滚。
          ssh -i ~/.ssh/cfp-ecs -o StrictHostKeyChecking=no "$ECS_USER@$ECS_HOST" "cd ~/cfp-mono && docker system prune -af && docker compose pull && docker compose up -d"

      - name: Smoke test
        env:
          SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
        run: bash deploy/smoke-test.sh
