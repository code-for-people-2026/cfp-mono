name: Deploy Production

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  affected:
    runs-on: ubuntu-latest
    outputs:
      website: ${{ steps.check.outputs.website }}
    steps:
      - uses: actions/checkout@v4
        if: github.event_name == 'push'
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        if: github.event_name == 'push'
        with:
          version: 10.2.0

      - uses: actions/setup-node@v4
        if: github.event_name == 'push'
        with:
          node-version: 22

      - id: check
        name: Check affected deploy targets
        run: |
          set_website() {
            echo "website=$1" >> "$GITHUB_OUTPUT"
            echo "website affected: $1"
          }

          if [ "$GITHUB_EVENT_NAME" != "push" ]; then
            set_website true
            exit 0
          fi

          base="${{ github.event.before }}"
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            set_website true
            exit 0
          fi

          if ! git cat-file -e "$base^{commit}"; then
            set_website true
            exit 0
          fi

          changed_files="$(git diff --name-only "$base" "$GITHUB_SHA")"
          printf '%s\n' "$changed_files"

          if printf '%s\n' "$changed_files" | grep -Eq '^(\.github/workflows/deploy-production\.yml|deploy/.*|package\.json|pnpm-lock\.yaml|pnpm-workspace\.yaml|turbo\.json)$'; then
            set_website true
            exit 0
          fi

          pnpm dlx turbo@2.6.3 run build "--filter=@cfp/website...[$base]" --dry-run=json --no-daemon > turbo-dry-run.json
          node <<'NODE'
          const fs = require("node:fs");

          const text = fs.readFileSync("turbo-dry-run.json", "utf8");
          const start = text.indexOf("{");
          if (start === -1) {
            throw new Error("Turbo dry run did not emit JSON.");
          }

          const data = JSON.parse(text.slice(start));
          const affected = data.tasks.length > 0;
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `website=${affected ? "true" : "false"}\n`);
          console.log(`website affected: ${affected}`);
          NODE

  prepare:
    needs: affected
    if: needs.affected.outputs.website == 'true'
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - id: check
        name: Check production deployment configuration
        env:
          ALIYUN_ACR_REGISTRY: ${{ secrets.ALIYUN_ACR_REGISTRY }}
          ALIYUN_ACR_NAMESPACE: ${{ secrets.ALIYUN_ACR_NAMESPACE }}
          ALIYUN_ACR_USERNAME: ${{ secrets.ALIYUN_ACR_USERNAME }}
          ALIYUN_ACR_PASSWORD: ${{ secrets.ALIYUN_ACR_PASSWORD }}
          ECS_SSH_KEY: ${{ secrets.ECS_SSH_KEY }}
          ECS_HOST: ${{ secrets.ECS_HOST }}
          ECS_USER: ${{ secrets.ECS_USER }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          missing=()
          for name in \
            ALIYUN_ACR_REGISTRY \
            ALIYUN_ACR_NAMESPACE \
            ALIYUN_ACR_USERNAME \
            ALIYUN_ACR_PASSWORD \
            ECS_SSH_KEY \
            ECS_HOST \
            ECS_USER \
            DATABASE_URL \
            PAYLOAD_SECRET \
            NEXT_PUBLIC_SITE_URL \
            DEEPSEEK_API_KEY
          do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -eq 0 ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "Production deployment is configured."
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Production deployment skipped because required secrets are missing: ${missing[*]}"
          fi

  deploy:
    needs: [affected, prepare]
    if: needs.affected.outputs.website == 'true' && needs.prepare.outputs.configured == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      WEBSITE_IMAGE: ${{ secrets.ALIYUN_ACR_REGISTRY }}/${{ secrets.ALIYUN_ACR_NAMESPACE }}/cfp-website:${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.2.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm verify

      - name: Login to Alibaba Cloud ACR
        uses: aliyun/acr-login@v1
        with:
          login-server: ${{ secrets.ALIYUN_ACR_REGISTRY }}
          username: ${{ secrets.ALIYUN_ACR_USERNAME }}
          password: ${{ secrets.ALIYUN_ACR_PASSWORD }}

      - name: Build and push image
        run: |
          docker build -f apps/website/Dockerfile -t "$WEBSITE_IMAGE" .
          docker push "$WEBSITE_IMAGE"

      - name: Write SSH key
        env:
          ECS_SSH_KEY: ${{ secrets.ECS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$ECS_SSH_KEY" > ~/.ssh/cfp-ecs
          chmod 600 ~/.ssh/cfp-ecs

      - name: Deploy on ECS
        env:
          ECS_HOST: ${{ secrets.ECS_HOST }}
          ECS_USER: ${{ secrets.ECS_USER }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
          DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL }}
          ACR_REGISTRY: ${{ secrets.ALIYUN_ACR_REGISTRY }}
          ACR_USERNAME: ${{ secrets.ALIYUN_ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ALIYUN_ACR_PASSWORD }}
        run: |
          cat > .env.production.remote <<EOF
          DATABASE_URL=$DATABASE_URL
          PAYLOAD_DATABASE_URL=$DATABASE_URL
          PAYLOAD_SECRET=$PAYLOAD_SECRET
          PAYLOAD_DB_PUSH=false
          ALLOW_ADMIN_BOOTSTRAP=false
          NEXT_PUBLIC_SITE_URL=$NEXT_PUBLIC_SITE_URL
          DEEPSEEK_API_KEY=$DEEPSEEK_API_KEY
          DEEPSEEK_BASE_URL=$DEEPSEEK_BASE_URL
          DEEPSEEK_MODEL=$DEEPSEEK_MODEL
          EOF

          cat > .env.images.remote <<EOF
          WEBSITE_IMAGE=$WEBSITE_IMAGE
          EOF

          ssh -i ~/.ssh/cfp-ecs -o StrictHostKeyChecking=no "$ECS_USER@$ECS_HOST" "mkdir -p ~/cfp-mono"
          scp -i ~/.ssh/cfp-ecs -o StrictHostKeyChecking=no deploy/docker-compose.prod.yml "$ECS_USER@$ECS_HOST:~/cfp-mono/docker-compose.yml"
          scp -i ~/.ssh/cfp-ecs -o StrictHostKeyChecking=no .env.production.remote "$ECS_USER@$ECS_HOST:~/cfp-mono/.env.production"
          scp -i ~/.ssh/cfp-ecs -o StrictHostKeyChecking=no .env.images.remote "$ECS_USER@$ECS_HOST:~/cfp-mono/.env"
          printf '%s' "$ACR_PASSWORD" | ssh -i ~/.ssh/cfp-ecs -o StrictHostKeyChecking=no "$ECS_USER@$ECS_HOST" \
            "docker login --username '$ACR_USERNAME' --password-stdin '$ACR_REGISTRY'"
          ssh -i ~/.ssh/cfp-ecs -o StrictHostKeyChecking=no "$ECS_USER@$ECS_HOST" "cd ~/cfp-mono && docker compose pull && docker compose up -d"

      - name: Smoke test
        env:
          SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
        run: bash deploy/smoke-test.sh
