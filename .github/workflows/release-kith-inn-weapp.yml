name: Release kith-inn Weapp Trial
on:
  workflow_dispatch:
    inputs:
      release_sha:
        description: 已部署且 smoke 通过的完整 main SHA
        required: true
        type: string
      version:
        description: 微信体验版版本号
        required: true
        type: string
permissions:
  actions: read
  contents: read
jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      deploy_run_id: ${{ steps.marker.outputs.deploy_run_id }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_sha }}
          fetch-depth: 0
      - id: marker
        name: Resolve main SHA smoke marker
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ inputs.release_sha }}
        run: |
          set -euo pipefail
          [[ "$GITHUB_REF" == refs/heads/main && "$RELEASE_SHA" =~ ^[0-9a-f]{40}$ ]]
          git fetch --no-tags origin main
          [[ "$(git rev-parse HEAD)" == "$RELEASE_SHA" ]]
          git merge-base --is-ancestor "$RELEASE_SHA" origin/main
          name="kith-inn-smoke-passed-$RELEASE_SHA"
          response="$(gh api -X GET "repos/$GITHUB_REPOSITORY/actions/artifacts" -f name="$name" -f per_page=100)"
          artifact="$(jq -cer --arg sha "$RELEASE_SHA" --arg name "$name" '
            [.artifacts[] | select(.name == $name and .expired == false and .workflow_run.head_sha == $sha and
              .workflow_run.head_branch == "main")] | sort_by(.created_at) | last | select(.)' <<<"$response")"
          deploy_run_id="$(jq -er '.workflow_run.id | tostring' <<<"$artifact")"
          gh api "repos/$GITHUB_REPOSITORY/actions/runs/$deploy_run_id" |
            jq -e --arg sha "$RELEASE_SHA" '.name == "Deploy Production" and .conclusion == "success" and
              .head_branch == "main" and .head_sha == $sha' >/dev/null
          printf 'deploy_run_id=%s\n' "$deploy_run_id" >>"$GITHUB_OUTPUT"
      - uses: actions/download-artifact@v4
        with:
          name: kith-inn-smoke-passed-${{ inputs.release_sha }}
          github-token: ${{ github.token }}
          run-id: ${{ steps.marker.outputs.deploy_run_id }}
          path: smoke-marker
      - uses: pnpm/action-setup@v4
        with: { version: 10.2.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Validate downloaded smoke marker
        env:
          RELEASE_SHA: ${{ inputs.release_sha }}
          SMOKE_DEPLOY_RUN_ID: ${{ steps.marker.outputs.deploy_run_id }}
        run: |
          [[ "$(find smoke-marker -type f | wc -l)" -eq 1 ]]
          pnpm --filter @cfp/kith-inn-fe validate:weapp-marker -- --marker "$GITHUB_WORKSPACE/smoke-marker/smoke-passed.json"
  upload:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: Production
    steps:
      - uses: actions/checkout@v4
        with: { ref: "${{ inputs.release_sha }}" }
      - uses: actions/download-artifact@v4
        with:
          name: kith-inn-smoke-passed-${{ inputs.release_sha }}
          github-token: ${{ github.token }}
          run-id: ${{ needs.verify.outputs.deploy_run_id }}
          path: smoke-marker
      - uses: pnpm/action-setup@v4
        with: { version: 10.2.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Install fixed-egress proxy client
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y proxychains4
      - name: Build and upload trial
        env:
          RELEASE_SHA: ${{ inputs.release_sha }}
          SMOKE_DEPLOY_RUN_ID: ${{ needs.verify.outputs.deploy_run_id }}
          BE_BASE_URL: ${{ vars.KITH_INN_BE_BASE_URL }}
          ECS_HOST: ${{ secrets.ECS_HOST }}
          ECS_SSH_KNOWN_HOSTS: ${{ secrets.ECS_SSH_KNOWN_HOSTS }}
          KITH_INN_UPLOAD_PROXY_SSH_USER: ${{ secrets.KITH_INN_UPLOAD_PROXY_SSH_USER }}
          KITH_INN_UPLOAD_PROXY_SSH_KEY: ${{ secrets.KITH_INN_UPLOAD_PROXY_SSH_KEY }}
          WX_APPID: ${{ secrets.WX_APPID }}
          KITH_INN_MINIPROGRAM_PRIVATE_KEY: ${{ secrets.KITH_INN_MINIPROGRAM_PRIVATE_KEY }}
          KITH_INN_MINIPROGRAM_IP_WHITELIST_ENABLED: ${{ vars.KITH_INN_MINIPROGRAM_IP_WHITELIST_ENABLED }}
          WEAPP_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          for name in ECS_HOST ECS_SSH_KNOWN_HOSTS KITH_INN_UPLOAD_PROXY_SSH_USER KITH_INN_UPLOAD_PROXY_SSH_KEY; do
            [[ -n "${!name//[[:space:]]/}" ]] || { echo "::error::固定上传出口缺少配置名称：$name"; exit 1; }
          done
          [[ "$ECS_HOST" =~ ^([0-9]{1,3}\.){3}[0-9]{1,3}$ ]] || { echo "::error::固定上传出口配置无效"; exit 1; }

          install -d -m 700 "$RUNNER_TEMP/kith-inn-upload-ssh"
          key_path="$RUNNER_TEMP/kith-inn-upload-ssh/id_ed25519"
          known_hosts_path="$RUNNER_TEMP/kith-inn-upload-ssh/known_hosts"
          control_socket="$RUNNER_TEMP/kith-inn-upload-ssh/control"
          proxychains_config="$RUNNER_TEMP/kith-inn-upload-proxychains.conf"
          printf '%s\n' "$KITH_INN_UPLOAD_PROXY_SSH_KEY" > "$key_path"
          printf '%s\n' "$ECS_SSH_KNOWN_HOSTS" > "$known_hosts_path"
          chmod 600 "$key_path" "$known_hosts_path"
          printf '%s\n' strict_chain proxy_dns 'tcp_read_time_out 15000' 'tcp_connect_time_out 8000' \
            '[ProxyList]' 'socks5 127.0.0.1 1080' > "$proxychains_config"
          remote="$KITH_INN_UPLOAD_PROXY_SSH_USER@$ECS_HOST"
          cleanup() {
            set +e
            if [[ -S "$control_socket" ]]; then
              ssh -S "$control_socket" -O exit "$remote" >/dev/null 2>&1
            fi
            rm -rf "$RUNNER_TEMP/kith-inn-upload-ssh" "$proxychains_config"
          }
          trap cleanup EXIT
          ssh -M -S "$control_socket" -fNT -D 127.0.0.1:1080 -i "$key_path" \
            -o BatchMode=yes -o IdentitiesOnly=yes -o ExitOnForwardFailure=yes \
            -o StrictHostKeyChecking=yes -o UserKnownHostsFile="$known_hosts_path" \
            -o ServerAliveInterval=15 -o ServerAliveCountMax=2 "$remote"
          ssh -S "$control_socket" -O check "$remote" >/dev/null
          egress="$(PROXYCHAINS_CONF_FILE="$proxychains_config" proxychains4 -q \
            curl -4 -fsS --max-time 20 https://checkip.amazonaws.com | tr -d '[:space:]')"
          [[ "$egress" == "$ECS_HOST" ]] || { echo "::error::固定上传出口校验失败"; exit 1; }
          echo "::add-mask::$egress"

          desc="trial-${RELEASE_SHA:0:12}"
          PROXYCHAINS_CONF_FILE="$proxychains_config" proxychains4 -q \
            pnpm --filter @cfp/kith-inn-fe upload:weapp -- --version "$WEAPP_VERSION" --desc "$desc" \
              --marker "$GITHUB_WORKSPACE/smoke-marker/smoke-passed.json"
