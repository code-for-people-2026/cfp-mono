name: Release kith-inn Weapp Trial
on:
  workflow_dispatch:
    inputs:
      release_sha:
        description: 已部署且 smoke 通过的完整 main SHA
        required: true
        type: string
      version:
        description: 微信体验版版本号
        required: true
        type: string
permissions:
  actions: read
  contents: read
jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      deploy_run_id: ${{ steps.marker.outputs.deploy_run_id }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_sha }}
          fetch-depth: 0
      - id: marker
        name: Resolve main SHA smoke marker
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ inputs.release_sha }}
        run: |
          set -euo pipefail
          [[ "$GITHUB_REF" == refs/heads/main && "$RELEASE_SHA" =~ ^[0-9a-f]{40}$ ]]
          git fetch --no-tags origin main
          [[ "$(git rev-parse HEAD)" == "$RELEASE_SHA" ]]
          git merge-base --is-ancestor "$RELEASE_SHA" origin/main
          name="kith-inn-smoke-passed-$RELEASE_SHA"
          response="$(gh api -X GET "repos/$GITHUB_REPOSITORY/actions/artifacts" -f name="$name" -f per_page=100)"
          artifact="$(jq -cer --arg sha "$RELEASE_SHA" --arg name "$name" '
            [.artifacts[] | select(.name == $name and .expired == false and .workflow_run.head_sha == $sha and
              .workflow_run.head_branch == "main")] | sort_by(.created_at) | last | select(.)' <<<"$response")"
          deploy_run_id="$(jq -er '.workflow_run.id | tostring' <<<"$artifact")"
          gh api "repos/$GITHUB_REPOSITORY/actions/runs/$deploy_run_id" |
            jq -e --arg sha "$RELEASE_SHA" '.name == "Deploy Production" and .conclusion == "success" and
              .head_branch == "main" and .head_sha == $sha' >/dev/null
          printf 'deploy_run_id=%s\n' "$deploy_run_id" >>"$GITHUB_OUTPUT"
      - uses: actions/download-artifact@v4
        with:
          name: kith-inn-smoke-passed-${{ inputs.release_sha }}
          github-token: ${{ github.token }}
          run-id: ${{ steps.marker.outputs.deploy_run_id }}
          path: smoke-marker
      - uses: pnpm/action-setup@v4
        with: { version: 10.2.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Validate downloaded smoke marker
        env:
          RELEASE_SHA: ${{ inputs.release_sha }}
          SMOKE_DEPLOY_RUN_ID: ${{ steps.marker.outputs.deploy_run_id }}
        run: |
          [[ "$(find smoke-marker -type f | wc -l)" -eq 1 ]]
          pnpm --filter @cfp/kith-inn-fe validate:weapp-marker -- --marker "$GITHUB_WORKSPACE/smoke-marker/smoke-passed.json"
  upload:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: Production
    steps:
      - uses: actions/checkout@v4
        with: { ref: "${{ inputs.release_sha }}" }
      - uses: actions/download-artifact@v4
        with:
          name: kith-inn-smoke-passed-${{ inputs.release_sha }}
          github-token: ${{ github.token }}
          run-id: ${{ needs.verify.outputs.deploy_run_id }}
          path: smoke-marker
      - uses: pnpm/action-setup@v4
        with: { version: 10.2.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Build and upload trial
        env:
          RELEASE_SHA: ${{ inputs.release_sha }}
          SMOKE_DEPLOY_RUN_ID: ${{ needs.verify.outputs.deploy_run_id }}
          BE_BASE_URL: ${{ vars.KITH_INN_BE_BASE_URL }}
          WX_APPID: ${{ secrets.WX_APPID }}
          KITH_INN_MINIPROGRAM_PRIVATE_KEY: ${{ secrets.KITH_INN_MINIPROGRAM_PRIVATE_KEY }}
          KITH_INN_MINIPROGRAM_IP_WHITELIST_ENABLED: ${{ vars.KITH_INN_MINIPROGRAM_IP_WHITELIST_ENABLED }}
          WEAPP_VERSION: ${{ inputs.version }}
        run: |
          desc="trial-${RELEASE_SHA:0:12}"
          pnpm --filter @cfp/kith-inn-fe upload:weapp -- --version "$WEAPP_VERSION" --desc "$desc" \
            --marker "$GITHUB_WORKSPACE/smoke-marker/smoke-passed.json"
