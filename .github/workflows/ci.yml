name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54324/cfp
      PAYLOAD_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54324/cfp
      PAYLOAD_SECRET: ci-secret
      PAYLOAD_DB_PUSH: "true"
      ALLOW_ADMIN_BOOTSTRAP: "true"
    services:
      postgres:
        image: postgres:17-alpine
        ports:
          - 54324:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cfp
        options: >-
          --health-cmd "pg_isready -U postgres -d cfp"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.2.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm verify

      # e2e 只在 PR 时跑。merge 进 main(push)时省掉(playwright install 浏览器 + e2e 较慢),
      # 但上面 pnpm verify 里的 unit(lint+typecheck+test:coverage+knip+build)仍跑,作为
      # merge 后的快速复查 + 防御绕过 PR 直推 main 的提交。
      - run: pnpm --filter @cfp/website exec playwright install --with-deps chromium
        if: github.event_name == 'pull_request'

      - run: pnpm turbo run test:e2e --affected
        if: github.event_name == 'pull_request'

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reports
          path: |
            apps/*/coverage
            apps/*/playwright-report
            apps/*/test-results
