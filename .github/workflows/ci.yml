name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54324/cfp
      PAYLOAD_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54324/cfp
      PAYLOAD_SECRET: ci-secret
      PAYLOAD_DB_PUSH: "true"
      ALLOW_ADMIN_BOOTSTRAP: "true"
      KITH_INN_ALLOW_DEV_SEED_RESET: "1"
    services:
      postgres:
        image: postgres:17-alpine
        ports:
          - 54324:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cfp
        options: >-
          --health-cmd "pg_isready -U postgres -d cfp"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.2.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm verify

      # e2e 只在 PR 时跑。merge 进 main(push)时省掉(playwright install 浏览器 + e2e 较慢),
      # 但上面 pnpm verify 里的 unit(lint+typecheck+test:coverage+knip+build)仍跑,作为
      # merge 后的快速复查 + 防御绕过 PR 直推 main 的提交。
      - run: pnpm --filter @cfp/website exec playwright install --with-deps chromium
        if: github.event_name == 'pull_request'

      - name: Run affected E2E
        run: |
          e2e_filters=('--filter=...[origin/main]')
          if ! git diff --quiet origin/main...HEAD -- \
            apps/cms/package.json \
            apps/cms/next.config.ts \
            apps/cms/payload.config.ts \
            apps/cms/seed/run.ts \
            apps/cms/src/app/api/health/route.ts \
            apps/cms/src/app/api/internal/chat_messages \
            apps/cms/src/app/api/internal/customers \
            apps/cms/src/app/api/internal/fulfillments \
            apps/cms/src/app/api/internal/menu-plans \
            apps/cms/src/app/api/internal/offerings \
            apps/cms/src/app/api/internal/operator-by-openid \
            apps/cms/src/app/api/internal/orders \
            apps/cms/src/app/api/internal/seller \
            apps/cms/src/app/api/internal/service-slots \
            apps/cms/src/lib/internal.ts \
            apps/cms/src/lib/orderLifecycle.ts \
            apps/cms/src/lib/serviceSlotDate.ts \
            apps/cms/tests/helpers/kithInnMainline.ts \
            apps/kith-inn-be \
            packages/kith-inn-payload \
            packages/kith-inn-shared; then
            e2e_filters+=(--filter=@cfp/kith-inn-fe)
          fi
          if ! git diff --quiet origin/main...HEAD -- \
            apps/cms/package.json \
            apps/cms/next.config.ts \
            apps/cms/payload.config.ts \
            apps/cms/seed/run.ts \
            apps/cms/src/app/api/health/route.ts \
            apps/cms/src/app/api/internal/kiv1 \
            apps/cms/src/lib/kiv1-internal.ts \
            apps/kith-inn-v1-be \
            packages/kith-inn-v1-payload; then
            e2e_filters+=(--filter=@cfp/kith-inn-v1-fe)
          fi
          pnpm turbo run test:e2e --concurrency=1 "${e2e_filters[@]}"
        if: github.event_name == 'pull_request'

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reports
          path: |
            apps/*/coverage
            apps/*/playwright-report
            apps/*/test-results
            apps/kith-inn-fe/test-results/mainline-services
