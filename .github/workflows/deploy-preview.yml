name: Deploy Preview

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

jobs:
  preview-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Build-only origin; release workflows must inject the approved kith-inn API host.
      BE_BASE_URL: https://codeforpeople.cn
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.2.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm verify

      - name: Build deployable image
        run: |
          docker build --build-arg RELEASE_SHA="${{ github.sha }}" \
            -f apps/website/Dockerfile -t cfp-website:preview .
